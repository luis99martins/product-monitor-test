name: Confibor monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6
      
      - name: Restaurar estado anterior
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: confibor_state.json
          key: confibor-state-${{ github.run_number }}
          restore-keys: |
            confibor-state-
      
      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: pip install requests beautifulsoup4
      
      - name: Executar monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor_confibor.py --state-file confibor_state.json
      
      - name: Guardar novo estado
        uses: actions/cache/save@v4
        if: always()  # Guarda mesmo se houver erro
        with:
          path: confibor_state.json
          key: confibor-state-${{ github.run_number }}
